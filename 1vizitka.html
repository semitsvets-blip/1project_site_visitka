<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Лана Луцейкович — AI-исследователь & Vibe Coder</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ivory: #faf6f0;
    --ivory-2: #f5efe4;
    --gold: #c9a84c;
    --gold-light: #e8d08a;
    --gold-dark: #9a7a2e;
    --white-gold: #f0e8d0;
    --diamond: #e8f4ff;
    --shine: #ffffff;
    --text-dark: #2a2218;
    --text-mid: #5c4a2a;
    --text-light: #8a7050;
  }

  @keyframes floatCard {
    0%, 100% { transform: translateY(0px) rotateX(0deg); }
    50% { transform: translateY(-8px) rotateX(1deg); }
  }

  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }

  @keyframes glowPulse {
    0%, 100% { text-shadow: 0 0 20px rgba(201,168,76,0.4), 0 0 40px rgba(201,168,76,0.2); }
    50% { text-shadow: 0 0 30px rgba(201,168,76,0.7), 0 0 60px rgba(201,168,76,0.4), 0 0 80px rgba(232,208,138,0.2); }
  }

  @keyframes sparkle {
    0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
    50% { opacity: 1; transform: scale(1) rotate(180deg); }
  }

  @keyframes borderSpin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  @keyframes btnPulse {
    0%, 100% { box-shadow: 0 4px 24px rgba(201,168,76,0.4), 0 0 0 0 rgba(201,168,76,0.3); }
    50% { box-shadow: 0 8px 40px rgba(201,168,76,0.6), 0 0 0 10px rgba(201,168,76,0); }
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes diamondFloat {
    0%, 100% { transform: translateY(0) rotate(45deg) scale(1); opacity: 0.6; }
    50% { transform: translateY(-15px) rotate(45deg) scale(1.1); opacity: 1; }
  }

  @keyframes lineExpand {
    from { width: 0; }
    to { width: 100%; }
  }

  body {
    min-height: 100vh;
    background: var(--ivory);
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(232,208,138,0.1) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(232,244,255,0.15) 0%, transparent 70%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    font-family: 'Georgia', 'Times New Roman', serif;
    overflow-x: hidden;
  }

  /* Декоративный фон с сеткой */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* Плавающие искры */
  .sparkles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .sparkle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: var(--gold-light);
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    animation: sparkle linear infinite;
  }

  /* Карточка */
  .card {
    position: relative;
    z-index: 1;
    max-width: 680px;
    width: 100%;
    background: linear-gradient(145deg, #ffffff 0%, var(--ivory) 40%, var(--white-gold) 100%);
    border-radius: 32px;
    padding: 60px 56px;
    animation: floatCard 6s ease-in-out infinite;
    transition: transform 0.3s ease;
  }

  /* Бриллиантовый бордер */
  .card::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 34px;
    background: linear-gradient(135deg,
      var(--gold-light) 0%,
      var(--shine) 20%,
      var(--gold) 40%,
      var(--diamond) 50%,
      var(--gold) 60%,
      var(--shine) 80%,
      var(--gold-light) 100%
    );
    background-size: 300% 300%;
    animation: shimmer 4s linear infinite;
    z-index: -1;
  }

  /* Тень карточки */
  .card::after {
    content: '';
    position: absolute;
    inset: 20px -20px -30px;
    border-radius: 32px;
    background: linear-gradient(180deg, transparent 0%, rgba(201,168,76,0.15) 100%);
    filter: blur(30px);
    z-index: -2;
  }

  /* Декоративные алмазы на углах */
  .diamond-corner {
    position: absolute;
    width: 12px;
    height: 12px;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    transform: rotate(45deg);
    box-shadow: 0 0 10px rgba(201,168,76,0.6);
  }
  .diamond-corner.tl { top: 16px; left: 28px; }
  .diamond-corner.tr { top: 16px; right: 28px; }
  .diamond-corner.bl { bottom: 16px; left: 28px; }
  .diamond-corner.br { bottom: 16px; right: 28px; }

  /* Верхний орнамент */
  .top-ornament {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeInUp 0.8s ease both;
  }

  .ornament-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .ornament-line::before,
  .ornament-line::after {
    content: '';
    height: 1px;
    width: 60px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .ornament-diamond {
    width: 8px;
    height: 8px;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    transform: rotate(45deg);
    box-shadow: 0 0 8px rgba(201,168,76,0.5);
  }

  /* Аватар */
  .avatar-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 28px;
    animation: fadeInUp 0.8s ease 0.1s both;
  }

  .avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--ivory-2), var(--white-gold));
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow:
      0 0 0 2px var(--gold-light),
      0 0 0 6px rgba(201,168,76,0.1),
      0 8px 32px rgba(201,168,76,0.25);
  }

  .avatar::before {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    background: conic-gradient(from 0deg,
      var(--gold-light), var(--shine), var(--gold), var(--shine), var(--gold-light)
    );
    animation: borderSpin 4s linear infinite;
    z-index: -1;
  }

  .avatar-inner {
    width: 112px;
    height: 112px;
    border-radius: 50%;
    background: linear-gradient(135deg, #fff8f0, var(--ivory));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    position: relative;
    z-index: 1;
  }

  /* Имя */
  .name {
    text-align: center;
    margin-bottom: 8px;
    animation: fadeInUp 0.8s ease 0.2s both;
  }

  .name h1 {
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: 400;
    letter-spacing: 2px;
    background: linear-gradient(135deg,
      var(--gold-dark) 0%,
      var(--gold) 30%,
      var(--gold-light) 50%,
      var(--shine) 55%,
      var(--gold-light) 60%,
      var(--gold) 70%,
      var(--gold-dark) 100%
    );
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s linear infinite, glowPulse 3s ease-in-out infinite;
    filter: drop-shadow(0 2px 8px rgba(201,168,76,0.3));
    line-height: 1.2;
  }

  /* Разделитель под именем */
  .name-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 12px 0 24px;
    animation: fadeInUp 0.8s ease 0.3s both;
  }

  .name-divider::before,
  .name-divider::after {
    content: '';
    height: 1px;
    flex: 1;
    max-width: 80px;
    background: linear-gradient(90deg, transparent, var(--gold));
  }

  .name-divider::after {
    background: linear-gradient(90deg, var(--gold), transparent);
  }

  .name-divider svg { color: var(--gold); }

  /* Специализация */
  .spec {
    text-align: center;
    margin-bottom: 28px;
    animation: fadeInUp 0.8s ease 0.35s both;
  }

  .spec-title {
    font-size: 0.85rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
    font-family: 'Arial', sans-serif;
    font-weight: 400;
  }

  .spec-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .tag {
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 0.78rem;
    letter-spacing: 0.5px;
    font-family: 'Arial', sans-serif;
    transition: all 0.3s ease;
    cursor: default;
  }

  .tag-primary {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: #fff;
    box-shadow: 0 2px 12px rgba(201,168,76,0.35);
  }

  .tag-secondary {
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--text-mid);
  }

  .tag:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(201,168,76,0.4);
  }

  .tag-primary:hover {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
  }

  .tag-secondary:hover {
    background: rgba(201,168,76,0.15);
    border-color: var(--gold);
    color: var(--gold-dark);
  }

  /* Разделитель */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-light), var(--gold), var(--gold-light), transparent);
    margin: 28px 0;
    position: relative;
    animation: fadeInUp 0.8s ease 0.4s both;
  }

  .divider::before {
    content: '◆';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    color: var(--gold);
    font-size: 10px;
    background: var(--ivory);
    padding: 0 8px;
    line-height: 1;
  }

  /* Контакты */
  .contacts {
    margin-bottom: 28px;
    animation: fadeInUp 0.8s ease 0.45s both;
  }

  .contact-label {
    text-align: center;
    font-size: 0.78rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-light);
    font-family: 'Arial', sans-serif;
    margin-bottom: 16px;
  }

  /* Кнопка WhatsApp */
  .btn-write {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 16px 32px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    background: linear-gradient(135deg, var(--gold-dark) 0%, var(--gold) 50%, var(--gold-light) 100%);
    color: #fff;
    font-size: 1rem;
    font-family: 'Arial', sans-serif;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s ease;
    animation: btnPulse 3s ease-in-out infinite;
    box-shadow: 0 4px 24px rgba(201,168,76,0.4);
  }

  .btn-write::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.5s ease;
  }

  .btn-write:hover::before { left: 100%; }

  .btn-write:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 40px rgba(201,168,76,0.6);
  }

  .btn-write:active { transform: translateY(0); }

  /* Соцсети */
  .socials-label {
    text-align: center;
    font-size: 0.78rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-light);
    font-family: 'Arial', sans-serif;
    margin-bottom: 16px;
  }

  .socials {
    display: flex;
    justify-content: center;
    gap: 16px;
    animation: fadeInUp 0.8s ease 0.55s both;
  }

  .social-link {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    position: relative;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    background: linear-gradient(135deg, #fff, var(--ivory));
    border: 1.5px solid rgba(201,168,76,0.25);
    box-shadow: 0 2px 12px rgba(201,168,76,0.12);
  }

  .social-link::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .social-link:hover {
    transform: translateY(-5px) scale(1.12);
    box-shadow: 0 12px 30px rgba(201,168,76,0.4);
    border-color: var(--gold);
  }

  .social-link:hover::before { opacity: 1; }

  .social-link svg {
    position: relative;
    z-index: 1;
    transition: all 0.3s ease;
  }

  .social-link:hover svg { filter: brightness(10); }

  /* Нижний орнамент */
  .bottom-ornament {
    margin-top: 32px;
    text-align: center;
    animation: fadeInUp 0.8s ease 0.6s both;
  }

  .bottom-ornament .ornament-line::before,
  .bottom-ornament .ornament-line::after {
    width: 40px;
  }

  .bottom-text {
    font-size: 0.7rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-light);
    font-family: 'Arial', sans-serif;
    margin-top: 10px;
  }

  /* Tooltip */
  .tooltip-wrap { position: relative; }

  .tooltip {
    position: absolute;
    bottom: calc(100% + 10px);
    left: 50%;
    transform: translateX(-50%) scale(0.8);
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: #fff;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-family: 'Arial', sans-serif;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    letter-spacing: 0.5px;
  }

  .tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: var(--gold);
  }

  .tooltip-wrap:hover .tooltip {
    opacity: 1;
    transform: translateX(-50%) scale(1);
  }

  /* Копирование номера */
  .phone-copy {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--gold-dark);
    font-size: 0.82rem;
    font-family: 'Arial', sans-serif;
    cursor: pointer;
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid rgba(201,168,76,0.2);
    background: rgba(201,168,76,0.04);
    transition: all 0.3s ease;
    margin-bottom: 16px;
  }

  .phone-copy:hover {
    background: rgba(201,168,76,0.1);
    border-color: var(--gold);
    transform: scale(1.02);
  }

  .phone-row {
    text-align: center;
    margin-bottom: 16px;
  }

  /* Copied notification */
  .copied-msg {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: #fff;
    padding: 12px 28px;
    border-radius: 30px;
    font-family: 'Arial', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 1px;
    opacity: 0;
    pointer-events: none;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 999;
    box-shadow: 0 8px 30px rgba(201,168,76,0.4);
  }

  .copied-msg.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Адаптив */
  @media (max-width: 600px) {
    .card { padding: 44px 28px; border-radius: 24px; }
    .card::before { border-radius: 26px; }
    .name h1 { font-size: 1.9rem; letter-spacing: 1px; }
    .social-link { width: 46px; height: 46px; }
    .socials { gap: 12px; }
    .btn-write { font-size: 0.88rem; padding: 14px 24px; }
    .diamond-corner.tl { left: 16px; }
    .diamond-corner.tr { right: 16px; }
    .diamond-corner.bl { left: 16px; }
    .diamond-corner.br { right: 16px; }
  }

  @media (max-width: 380px) {
    .card { padding: 36px 20px; }
    .name h1 { font-size: 1.65rem; }
    .tag { font-size: 0.72rem; padding: 5px 12px; }
  }
</style>
</head>
<body>

<!-- Фоновые искры -->
<div class="sparkles" id="sparkles"></div>

<!-- Карточка -->
<div class="card">
  <div class="diamond-corner tl"></div>
  <div class="diamond-corner tr"></div>
  <div class="diamond-corner bl"></div>
  <div class="diamond-corner br"></div>

  <!-- Верхний орнамент -->
  <div class="top-ornament">
    <div class="ornament-line">
      <div class="ornament-diamond"></div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L14.5 9H22L16 13.5L18.5 20.5L12 16L5.5 20.5L8 13.5L2 9H9.5L12 2Z" fill="#c9a84c"/>
      </svg>
      <div class="ornament-diamond"></div>
    </div>
  </div>

  <!-- Аватар -->
  <div class="avatar-wrap">
    <div class="avatar">
      <div class="avatar-inner">
        <svg width="64" height="64" viewBox="0 0 80 80" fill="none">
          <!-- Силуэт лица -->
          <circle cx="40" cy="28" r="18" fill="url(#faceGrad)"/>
          <ellipse cx="40" cy="68" rx="24" ry="14" fill="url(#bodyGrad)"/>
          <!-- Корона / AI символ -->
          <path d="M30 18 L35 10 L40 16 L45 10 L50 18" stroke="#c9a84c" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <circle cx="30" cy="18" r="2" fill="#c9a84c"/>
          <circle cx="40" cy="16" r="2" fill="#e8d08a"/>
          <circle cx="50" cy="18" r="2" fill="#c9a84c"/>
          <defs>
            <linearGradient id="faceGrad" x1="22" y1="10" x2="58" y2="46" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#fdf0e0"/>
              <stop offset="100%" stop-color="#e8d5b8"/>
            </linearGradient>
            <linearGradient id="bodyGrad" x1="16" y1="54" x2="64" y2="82" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#c9a84c"/>
              <stop offset="100%" stop-color="#9a7a2e"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
    </div>
  </div>

  <!-- Имя -->
  <div class="name">
    <h1>Лана Луцейкович</h1>
  </div>

  <!-- Разделитель под именем -->
  <div class="name-divider">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="#c9a84c">
      <path d="M12 2L9.19 8.63L2 9.24L7 13.97L5.82 21L12 17.27L18.18 21L17 13.97L22 9.24L14.81 8.63L12 2Z"/>
    </svg>
  </div>

  <!-- Специализация -->
  <div class="spec">
    <div class="spec-title">Специализация</div>
    <div class="spec-tags">
      <span class="tag tag-primary">AI-исследователь</span>
      <span class="tag tag-primary">Vibe Coder</span>
      <span class="tag tag-secondary">Визитки</span>
      <span class="tag tag-secondary">Квизы</span>
      <span class="tag tag-secondary">Калькуляторы</span>
      <span class="tag tag-secondary">Портфолио</span>
      <span class="tag tag-secondary">Landing Page</span>
      <span class="tag tag-secondary">miniApp</span>
      <span class="tag tag-secondary">Интернет-магазины</span>
    </div>
  </div>

  <!-- Разделитель -->
  <div class="divider"></div>

  <!-- Контакты -->
  <div class="contacts">
    <div class="contact-label">Связаться</div>

    <!-- Номер телефона (копировать) -->
    <div class="phone-row">
      <span class="phone-copy" onclick="copyPhone()" title="Нажмите, чтобы скопировать">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
        </svg>
        +7 903 744 90 40
      </span>
    </div>

    <!-- Кнопка WhatsApp -->

<!-- Уведомление о копировании -->
<div class="copied-msg" id="copiedMsg">✓ Номер скопирован</div>

<script>
  // Генерация фоновых искр
  (function() {
    const container = document.getElementById('sparkles');
    const count = 18;
    const sizes = [4, 6, 8, 5, 7];
    const delays = [0, 1.5, 3, 4.5, 6, 7, 2, 5, 8, 1, 3.5, 5.5];
    const durations = [3, 4, 5, 6, 7, 3.5, 4.5, 5.5];

    for (let i = 0; i < count; i++) {
      const s = document.createElement('div');
      s.className = 'sparkle';
      const size = sizes[i % sizes.length];
      s.style.cssText = [
        `width:${size}px`,
        `height:${size}px`,
        `left:${Math.random() * 100}%`,
        `top:${Math.random() * 100}%`,
        `animation-delay:${delays[i % delays.length]}s`,
        `animation-duration:${durations[i % durations.length]}s`,
        `opacity:0`
      ].join(';');
      container.appendChild(s);
    }
  })();

  // Копирование номера
  function copyPhone() {
    const phone = '+79037449040';
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(phone).then(showCopied);
    } else {
      const ta = document.createElement('textarea');
      ta.value = phone;
      ta.style.cssText = 'position:fixed;opacity:0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showCopied();
    }
  }

  function showCopied() {
    const msg = document.getElementById('copiedMsg');
    msg.classList.add('show');
    setTimeout(() => msg.classList.remove('show'), 2200);
  }

  // 3D-наклон карточки по движению мыши (только десктоп)
  const card = document.querySelector('.card');
  document.addEventListener('mousemove', function(e) {
    if (window.innerWidth < 768) return;
    const rect = card.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = (e.clientX - cx) / (window.innerWidth / 2);
    const dy = (e.clientY - cy) / (window.innerHeight / 2);
    card.style.transform = `perspective(1200px) rotateY(${dx * 5}deg) rotateX(${-dy * 4}deg) translateY(-4px)`;
  });

  document.addEventListener('mouseleave', function() {
    card.style.transform = '';
  });
</script>
